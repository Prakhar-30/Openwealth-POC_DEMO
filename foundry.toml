[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "reactive-lib/=lib/reactive-lib/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]
optimizer = true
optimizer_runs = 200
solc_version = "0.8.28"
evm_version = "shanghai"

[rpc_endpoints]
sepolia = "https://eth-sepolia.g.alchemy.com/v2/QnTJicdL-OSJilaE2y4wVXLy_XuFKmJB"
base_sepolia = "https://base-sepolia.g.alchemy.com/v2/QnTJicdL-OSJilaE2y4wVXLy_XuFKmJB"
lasna = "https://lasna-rpc.rnk.dev/"
